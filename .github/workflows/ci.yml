name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/controle_estoque?schema=public

defaults:
  run:
    shell: bash

jobs:
  detect-tests:
    name: Detect Test Configuration
    runs-on: ubuntu-latest
    outputs:
      has-unit-config: ${{ steps.detect.outputs.has-unit-config }}
      has-e2e-config: ${{ steps.detect.outputs.has-e2e-config }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect test config files
        id: detect
        run: |
          if [ -f vitest.config.ts ] || [ -f vitest.config.mts ] || [ -f vitest.config.js ] || [ -f vitest.config.mjs ] || [ -f jest.config.ts ] || [ -f jest.config.js ] || [ -f jest.config.mjs ] || [ -f jest.config.cjs ]; then
            echo "has-unit-config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-unit-config=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f playwright.config.ts ] || [ -f playwright.config.js ] || [ -f playwright.config.mjs ] || [ -f playwright.config.cjs ]; then
            echo "has-e2e-config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-e2e-config=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Quality
    needs: detect-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: controle_estoque
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d controle_estoque"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json', 'src/**/*.ts', 'src/**/*.tsx', 'next.config.*', 'prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Sync database schema
        run: |
          if [ -d prisma/migrations ] && [ -n "$(find prisma/migrations -mindepth 1 -maxdepth 1 -type d -print -quit)" ]; then
            npx prisma migrate deploy
          else
            npx prisma db push --skip-generate
          fi

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  unit-tests:
    name: Unit Tests
    if: ${{ needs.detect-tests.outputs.has-unit-config == 'true' }}
    needs:
      - detect-tests
      - quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: controle_estoque
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d controle_estoque"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        run: |
          if [ -d prisma/migrations ] && [ -n "$(find prisma/migrations -mindepth 1 -maxdepth 1 -type d -print -quit)" ]; then
            npx prisma migrate deploy
          else
            npx prisma db push --skip-generate
          fi

      - name: Seed database
        run: |
          if [ -f prisma/seed.ts ]; then
            npx prisma db seed
          fi

      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E
    if: ${{ needs.detect-tests.outputs.has-e2e-config == 'true' }}
    needs:
      - detect-tests
      - quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: controle_estoque
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d controle_estoque"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json', 'src/**/*.ts', 'src/**/*.tsx', 'next.config.*', 'prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        run: |
          if [ -d prisma/migrations ] && [ -n "$(find prisma/migrations -mindepth 1 -maxdepth 1 -type d -print -quit)" ]; then
            npx prisma migrate deploy
          else
            npx prisma db push --skip-generate
          fi

      - name: Seed database
        run: |
          if [ -f prisma/seed.ts ]; then
            npx prisma db seed
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
